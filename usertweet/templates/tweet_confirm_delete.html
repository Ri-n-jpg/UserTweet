{% extends "layout.html" %}

{% block title %}
Delete Tweet
{% endblock %}

{% block content %}

<div class="container mt-4 text-center">
    <h2>Are you sure you want to delete this tweet?</h2>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
    </form>

    <br>

    <a class="btn btn-success" href="{% url 'tweet_list' %}">
        Cancel
    </a>
</div>

{% endblock %}
